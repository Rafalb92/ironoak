services:
  postgres:
    image: postgres:16-alpine
    container_name: ironoak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ironoak
      POSTGRES_PASSWORD: ironoak_dev
      POSTGRES_DB: ironoak
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ironoak -d ironoak']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ironoak-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
